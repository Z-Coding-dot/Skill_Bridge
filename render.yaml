services:
  - type: web
    name: skillbridge-backend
    runtime: node
    rootDir: apps/backend
    buildCommand: npm install && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: skillbridge_session
      - key: CORS_ORIGIN
        value: https://skillbridge-frontend.onrender.com
      - key: BASE_URL
        value: https://skillbridge-backend.onrender.com
      - key: CLOUDINARY_CLOUD_NAME  
        value: your_cloud_name
      - key: CLOUDINARY_API_KEY
        value: your_api_key
      - key: CLOUDINARY_API_SECRET
        value: your_api_secret

  - type: web
    name: skillbridge-frontend
    runtime: node
    rootDir: apps/frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve dist
    envVars:
      - key: VITE_API_URL
        value: https://skillbridge-backend.onrender.com
      - key: VITE_USE_MOCK
        value: false

databases:
  - name: skillbridge-db
    plan: free